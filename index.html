<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSO VPN Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Section */
        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 45px;
            color: #1a73e8;
            margin: 0;
            font-weight: 900;
        }

        /* အသုံးပြုနည်းကြည့်ရန် စာသား (ခေါင်းစဉ်အောက်) */
        .instruction-text {
            color: #d93025;
            font-size: 24px;
            font-weight: 800;
            margin-top: 5px;
            background: #fff0f0;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #ffcfcf;
        }

        /* Box Buttons */
        .box-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 25px 0;
        }

        .nav-card {
            background: white;
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
            font-weight: bold;
            border: 2px solid transparent;
        }

        .nav-card.active {
            border-color: #1a73e8;
            background-color: #e8f0fe;
        }

        /* Guide Content */
        #guide-display {
            width: 100%;
            max-width: 450px;
            display: none;
        }

        .step-label {
            font-size: 30px;
            font-weight: 900;
            color: #202124;
            margin: 30px 0 10px 0;
            text-align: center;
        }

        .img-card {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .img-card img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* သတိပေးချက် Box */
        .warning-box {
            width: 100%;
            max-width: 360px;
            background-color: #fff4e5;
            border-left: 6px solid #ffa000;
            padding: 15px;
            margin-top: 30px;
            border-radius: 8px;
            color: #663c00;
        }

        .warning-box b {
            font-size: 20px;
            display: block;
            margin-bottom: 5px;
            color: #e65100;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>KSO VPN</h1>
        <div class="instruction-text">အသုံးပြုနည်းကြည့်ရန် ခလုတ်ကိုနှိပ်ပါ</div>
    </div>

    <div class="box-wrapper">
        <div id="box1" class="nav-card" onclick="openGuide(1)">
            <div style="font-size: 30px; margin-bottom: 8px;">🆔</div>
            VIP ID ပို့နည်း
        </div>
        <div id="box2" class="nav-card" onclick="openGuide(2)">
            <div style="font-size: 30px; margin-bottom: 8px;">🔌</div>
            VPN ချိတ်နည်း
        </div>
    </div>

    <div id="guide-display"></div>

    <div class="warning-box">
        <b>⚠️ သတိပေးချက်</b>
        လမ်းညွှန်ချက်များကို သေချာစွာဖတ်ပါ။ အကယ်၍ အဆင်မပြေပါက Admin ကို တိုက်ရိုက်ဆက်သွယ်မေးမြန်းနိုင်ပါသည်။
    </div>

    <script>
        let activeBox = null;

        const data = {
            box1: {
                title: "VIP ID ပို့နည်း အဆင့် ",
                images: [
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip1.jpg",
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip2.jpg"
                ]
            },
            box2: {
                title: "VPN ချိတ်နည်း အဆင့် ",
                images: [
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip3.jpg",
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip4.jpg",
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip5.jpg",
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip6.jpg",
                    "https://raw.githubusercontent.com/KYAWSOEOO8/Box2/refs/heads/main/vip7.jpg"
                ]
            }
        };

        function openGuide(num) {
            const display = document.getElementById('guide-display');
            const b1 = document.getElementById('box1');
            const b2 = document.getElementById('box2');

            if (activeBox === num) {
                display.style.display = 'none';
                activeBox = null;
                b1.classList.remove('active');
                b2.classList.remove('active');
                return;
            }

            activeBox = num;
            display.style.display = 'block';
            display.innerHTML = '';

            b1.classList.toggle('active', num === 1);
            b2.classList.toggle('active', num === 2);

            const selected = data['box' + num];

            selected.images.forEach((url, i) => {
                const item = document.createElement('div');
                item.style.marginBottom = "40px";
                item.innerHTML = `
                    <div class="step-label">${selected.title} ${i + 1}</div>
                    <div class="img-card">
                        <img src="${url}" alt="Step">
                    </div>
                `;
                display.appendChild(item);
            });

            window.scrollTo({ top: 250, behavior: 'smooth' });
        }
    </script>

</body>
</html>
